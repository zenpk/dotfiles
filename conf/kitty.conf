# vim:fileencoding=utf-8:foldmethod=marker

font_family      JetBrainsMonoNL Nerd Font Mono
bold_font        JetBrainsMonoNL Nerd Font Mono
italic_font      JetBrainsMonoNL Nerd Font Mono
bold_italic_font JetBrainsMonoNL Nerd Font Mono

font_size 15.0 

cursor_shape block
shell_integration no-cursor
disable_ligatures never
scrollback_lines 20000

mouse_map left click ungrabbed no_op
mouse_map ctrl+left release grabbed,ungrabbed mouse_handle_click link

background_opacity 1
# background_opacity 0.95
# background_blur 10


# Tab Bar Design
tab_bar_style          powerline
tab_separator          ""
tab_bar_background     #2b394f
tab_bar_margin_width   0.0
tab_bar_margin_height  0.0 0.0
tab_bar_edge           bottom
# Active Tab Styling
active_tab_font_style   bold
active_tab_foreground   #000
active_tab_background   #95c47a
# Inactive Tab Styling
inactive_tab_font_style bold
inactive_tab_foreground #000
inactive_tab_background #688dbd
tab_title_template "{index} {title}{' [*]' if layout_name == 'stack' else ''}"

startup_session ~/.config/kitty/sessions/default

# Shortcuts
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9
map ctrl+0 goto_tab 10
map ctrl+a>c new_tab
map ctrl+a>x close_tab
map ctrl+a>, set_tab_title
map ctrl+a>s save_as_session
map ctrl+a>shift+s save_as_session ~/.config/kitty/sessions/default
map ctrl+a>d goto_session ~/.config/kitty/sessions/default
map ctrl+a>m goto_session ~/.config/kitty/sessions/my
map ctrl+a>w goto_session ~/.config/kitty/sessions/work

# BEGIN_KITTY_THEME
# One Half Dark
include kitty-current-theme.conf
# END_KITTY_THEME
